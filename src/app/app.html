<button (click)="onclick()">{{text}} Wish List</button>
<div class="product" *ngIf="flag1">

  <app-movie-cart 
  *ngFor="let l of list" 
  [name1]="l.name" 
  [price1]="l.price" 
  [rating1]="l.rating" 
  [url1]="l.url" 
  (name2)="function($event)">
</app-movie-cart>

</div>

<div class="product" *ngIf="!flag1">

  <app-watch-list   
  *ngFor="let l of newlist" 
  [name1]="l.name" 
  [price1]="l.price" 
  [rating1]="l.rating" 
  [url1]="l.url">
</app-watch-list>

</div>
